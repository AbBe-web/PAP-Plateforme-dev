<h1>Résumé de l'évaluation de préparation de la consultation d'activité physique</h1>

<p id="questionnaire-type" class="small"></p>

<p class="small">
Questionnaire d’auto-évaluation à conserver si vous le souhaitez et à transmettre à votre médecin pour en discuter.<br>
Date : <span id="date"></span>
</p>

<div id="content"></div>

<script>
function goBack() {
  window.location.href = "index.html";
}
  
function getJSONFromURL(){

  const stored = sessionStorage.getItem("preconsultation_final");

  if (!stored) {
    console.warn("Aucune donnée trouvée dans sessionStorage");
    return null;
  }

  try {
    return JSON.parse(stored);
  } catch (e) {
    console.warn("JSON invalide", e);
    return null;
  }

}
const rawData = getJSONFromURL();
let storedData = null;

if (typeof window.sessionStorage !== "undefined") {
  try {
    storedData = sessionStorage.getItem("preconsultation_final");
  } catch (e) {
    console.warn("Impossible de lire les données de session", e);
  }
}

let parsedStored = null;

if (storedData) {
  try {
    parsedStored = JSON.parse(storedData);
  } catch (e) {
    console.warn("JSON session invalide", e);
  }
}

const data = parsedStored || rawData;

// 🔹 Affichage date du jour (format français)
const today = new Date();
const formattedDate = today.toLocaleDateString("fr-FR");

const dateElement = document.getElementById("date");
if (dateElement) {
  dateElement.textContent = formattedDate;
}
if (!data) {
  document.getElementById("content").innerHTML =
    "<p>Données indisponibles.</p>";
  throw new Error("Aucune donnée patient disponible");
}

document.getElementById("content").innerHTML = `

<h2>1. Synthèse</h2>

<p class="synthese-line">
  <strong>Niveau d’activité physique :</strong>
  ${data.resultats.niveau_activite.replace("_"," ")}
  ${
    data.meta.questionnaire === "GPAQ" &&
    data.resultats.met_minutes_semaine != null
      ? `<span class="small">
           (volume estimé : ${data.resultats.met_minutes_semaine} MET-min / semaine)
         </span>`
      : ""
  }
</p>

${data.resultats.pas_moyens_jour_1_mois
  ? `<p class="synthese-line">
       <strong>Nombre de pas moyen (1 mois) :</strong>
       ${data.resultats.pas_moyens_jour_1_mois} pas / jour
     </p>`
  : ""
}

${(() => {

const sedH =
  data.questionnaires?.gpaq?.sedentarite?.heures_par_jour ??
  data.questionnaires?.marshall?.sedentarite?.heures_par_jour;

const sedM =
  data.questionnaires?.gpaq?.sedentarite?.minutes_par_jour ??
  data.questionnaires?.marshall?.sedentarite?.minutes_par_jour;

if(!sedH && !sedM) return "";

return `<p class="synthese-line">
<strong>Temps assis / couché (hors sommeil) :</strong>
${sedH ?? 0} h ${sedM ?? 0} min / jour
</p>`;

})()}
<p class="synthese-line">
  <strong>Stade motivationnel :</strong>
  ${data.motivation.stade}
</p>

<p class="synthese-line">
  <strong>Importance de l’activité physique :</strong>
  ${data.motivation.importance_eva_0_10}/10
</p>

${data.motivation.importance_commentaire
  ? `<p class="verbatim small">“${data.motivation.importance_commentaire}”</p>`
  : ""
}

<p class="synthese-line">
  <strong>Confiance en soi pour augmenter / maintenir son niveau d’activité :</strong>
  ${data.motivation.confiance_eva_0_10}/10
</p>

${data.motivation.confiance_commentaire
  ? `<p class="verbatim small">“${data.motivation.confiance_commentaire}”</p>`
  : ""
}

<div id="gpaq-section">
  <h2 id="gpaq-title">Questionnaire GPAQ – Détail</h2>

  <h3>Travail</h3>

  <table>
    <tr>
      <th>Intensité</th>
      <th>Fréquence</th>
      <th>Durée par jour</th>
    </tr>

    <tr>
      <td>Intense</td>
      <td>
        ${data.questionnaires.gpaq?.travail?.intense?.jours_par_semaine ?? 0} jours / semaine
      </td>
      <td>
        ${(data.questionnaires.gpaq?.travail?.intense?.heures_par_jour || 0)} h
        ${(data.questionnaires.gpaq?.travail?.intense?.minutes_par_jour || 0)} min
      </td>
    </tr>

    <tr>
      <td>Modérée</td>
      <td>
        ${data.questionnaires.gpaq?.travail?.moderee?.jours_par_semaine ?? 0} jours / semaine
      </td>
      <td>
        ${(data.questionnaires.gpaq?.travail?.moderee?.heures_par_jour || 0)} h
        ${(data.questionnaires.gpaq?.travail?.moderee?.minutes_par_jour || 0)} min
      </td>
    </tr>
  </table>

  <h3>Déplacements</h3>

  <table>
    <tr>
      <th>Type</th>
      <th>Fréquence</th>
      <th>Durée par jour</th>
    </tr>

    <tr>
      <td>Marche / vélo ≥ 10 min</td>
      <td>
        ${data.questionnaires.gpaq?.deplacements?.jours_par_semaine ?? 0} jours / semaine
      </td>
      <td>
        ${(data.questionnaires.gpaq?.deplacements?.heures_par_jour || 0)} h
        ${(data.questionnaires.gpaq?.deplacements?.minutes_par_jour || 0)} min
      </td>
    </tr>
  </table>

  <h3>Loisirs</h3>

  <table>
    <tr>
      <th>Intensité</th>
      <th>Fréquence</th>
      <th>Durée par jour</th>
    </tr>

    <tr>
      <td>Intense</td>
      <td>
        ${data.questionnaires.gpaq?.loisirs?.intense?.jours_par_semaine ?? 0} jours / semaine
      </td>
      <td>
        ${(data.questionnaires.gpaq?.loisirs?.intense?.heures_par_jour || 0)} h
        ${(data.questionnaires.gpaq?.loisirs?.intense?.minutes_par_jour || 0)} min
      </td>
    </tr>

    <tr>
      <td>Modérée</td>
      <td>
        ${data.questionnaires.gpaq?.loisirs?.moderee?.jours_par_semaine ?? 0} jours / semaine
      </td>
      <td>
        ${(data.questionnaires.gpaq?.loisirs?.moderee?.heures_par_jour || 0)} h
        ${(data.questionnaires.gpaq?.loisirs?.moderee?.minutes_par_jour || 0)} min
      </td>
    </tr>
  </table>

  <h3>Comportement sédentaire</h3>

  <table>
    <tr>
      <th>Temps assis / couché (hors sommeil)</th>
    </tr>
    <tr>
      <td>
        ${(data.questionnaires.gpaq?.sedentarite?.heures_par_jour || 0)} h
        ${(data.questionnaires.gpaq?.sedentarite?.minutes_par_jour || 0)} min / jour
      </td>
    </tr>
  </table>
</div>

<div id="marshall-section">
  <h2 id="marshall-title">2. Questionnaire Marshall</h2>
  <p>
    Score :
    ${(data.questionnaires.marshall?.q1 || 0) + (data.questionnaires.marshall?.q2 || 0)}
  </p>
</div>

<p class="small" style="margin-top:40px;">
  A l'aide des boutons situés dessous, gardez une copie pour pouvoir la présenter à votre médecin ou envoyer lui ce document pour en discuter avec lui. "Au pire", faites une copie d'écran.
</p>

<div class="actions">
  <div class="actions-buttons">
    <div class="action-item">
      <button onclick="window.print()">Imprimer / Enregistrer en PDF</button>
      <div class="action-text">Document complet à imprimer ou à partager</div>
    </div>

      <div class="action-item">
      <button onclick="copyContent()">Copier le contenu</button>
      <div class="action-text">Copie le résumé pour le partager</div>
    </div>

    <div class="action-item">
      <button onclick="downloadJSON()">Télécharger mes réponses</button>
      <div class="action-text">Fichier à conserver ou transmettre à votre médecin</div>
    </div>

  </div>
</div>
`;
// ==============================
// QR CODE POUR LE MÉDECIN
// ==============================

const qrContainer = document.createElement("div");
qrContainer.style.marginTop = "40px";
qrContainer.style.textAlign = "center";

const qrTitle = document.createElement("h2");
qrTitle.textContent = "QR code pour votre consultation médicale";

const qrDiv = document.createElement("div");

qrDiv.style.padding = "16px";
qrDiv.style.background = "white";
qrDiv.style.display = "inline-block";
qrDiv.style.margin = "20px auto";
qrDiv.style.boxSizing = "content-box";
qrDiv.style.borderRadius = "6px";

qrContainer.appendChild(qrTitle);
qrContainer.appendChild(qrDiv);

const qrNote = document.createElement("p");
qrNote.className = "small";
qrNote.style.marginTop = "10px";
qrNote.textContent = "Ce QR code peut être scanné par votre médecin pour importer vos réponses.";

qrContainer.appendChild(qrNote);
  
document.getElementById("content").appendChild(qrContainer);


// ------------------------------
// Construction du payload
// ------------------------------
let niveau = data.resultats.niveau_activite;

// normalisation Marshall
if (niveau === "insuffisamment_actif") niveau = "inactif";
if (niveau === "suffisamment_actif") niveau = "actif";

const sedH =
  data.questionnaires?.gpaq?.sedentarite?.heures_par_jour ??
  data.questionnaires?.marshall?.sedentarite?.heures_par_jour ??
  0;

const sedM =
  data.questionnaires?.gpaq?.sedentarite?.minutes_par_jour ??
  data.questionnaires?.marshall?.sedentarite?.minutes_par_jour ??
  0;

let qrPayload = {
v:1,
q: data.meta.questionnaire,
n: niveau,
m: data.resultats.met_minutes_semaine,
p: data.resultats.pas_moyens_jour_1_mois,
sd: `${sedH}:${sedM}`,
s: data.motivation.stade,
i: data.motivation.importance_eva_0_10,
c: data.motivation.confiance_eva_0_10,
ci: data.motivation.importance_commentaire || "",
cc: data.motivation.confiance_commentaire || ""
};
if (!qrPayload.ci) delete qrPayload.ci;
if (!qrPayload.cc) delete qrPayload.cc;
  
let qrData = JSON.stringify(qrPayload);

console.info("QR initial size:", qrData.length);


// ------------------------------
// Génération du QR
// ------------------------------

requestAnimationFrame(() => {

  setTimeout(() => {

 try {

   if(!qrDiv) return;

  qrDiv.innerHTML = "";

// Stabilisation 1
if (!qrData || qrData.length === 0) {
  console.warn("QR payload vide");
  return;
}

// Stabilisation 2
if (qrData.length > 350) {
  console.warn("QR payload > 350 caractères");
}

console.info("QR payload size:", qrData.length);

QRCode.toCanvas(qrData, {
  width: 260,
  errorCorrectionLevel: "M"
}, function (err, canvas) {

  if (err) {
    console.error(err);
    return;
  }

  qrDiv.innerHTML = "";
  qrDiv.appendChild(canvas);
});

} catch (e) {

  if (!e.message || !e.message.includes("overflow")) throw e;

  console.warn("QR overflow → suppression commentaires");

  delete qrPayload.ci;
  delete qrPayload.cc;

    qrData = JSON.stringify(qrPayload);

    try {
      qrDiv.innerHTML = "";
    
      new QRCode(qrDiv, {
        text: qrData,
        width: 260,
        height: 260,
        correctLevel: QRCode.CorrectLevel.L
      });

} catch (e2) {

  if (!e2.message || !e2.message.includes("overflow")) throw e2;

 console.warn("QR overflow → payload minimal");

const minimalData = JSON.stringify({
  q: data.meta.questionnaire,
  n: niveau,
  s: data.motivation.stade,
  i: data.motivation.importance_eva_0_10,
  c: data.motivation.confiance_eva_0_10
});

qrDiv.innerHTML = "";

new QRCode(qrDiv,{
  text: minimalData,
  width: 220,
  height: 220,
  correctLevel: QRCode.CorrectLevel.L
});

    }

  }

  },0);

});
  
  if (data.meta.questionnaire === "GPAQ") {
  const gpaqTitle = document.getElementById("gpaq-title");
  if (gpaqTitle) {
    gpaqTitle.innerText = "2. Questionnaire GPAQ – Détail";
  }
}

if (data.meta.questionnaire === "Marshall") {
  const marshallTitle = document.getElementById("marshall-title");
  if (marshallTitle) {
    marshallTitle.innerText = "2. Questionnaire Marshall";
  }
}
  if (data.meta.questionnaire === "Marshall") {
  const gpaq = document.getElementById("gpaq-section");
  if (gpaq) gpaq.style.display = "none";
}

if (data.meta.questionnaire === "GPAQ") {
  const marshall = document.getElementById("marshall-section");
  if (marshall) marshall.style.display = "none";
}
function buildReadableSummary(data) {

  if (!data) return "";

let output = "";

/* =========================
   TITRE
========================= */

output += "RÉSUMÉ DE LA PRÉ-CONSULTATION D’ACTIVITÉ PHYSIQUE\n";
output += "--------------------------------------------------\n\n";

/* =========================
   1. SYNTHÈSE
========================= */

output += "1. SYNTHÈSE\n";
output += "───────────\n";

output += "Niveau d’activité physique : ";
output += (data.resultats?.niveau_activite ?? "non_defini").replace("_"," ");
output += "\n";

output += "Volume estimé : ";
output += data.resultats?.met_minutes_semaine ?? 0;
output += " MET-min / semaine\n";

output += "\n";   // espace entre blocs
  
if (data.resultats.pas_moyens_jour_1_mois !== null) {
  output += "Nombre de pas moyen (1 mois) : ";
  output += data.resultats.pas_moyens_jour_1_mois;
  output += " pas / jour\n";
}

output += "\n";
  
const sedH =
  data?.questionnaires?.gpaq?.sedentarite?.heures_par_jour ??
  data?.questionnaires?.marshall?.sedentarite?.heures_par_jour ??
  null;

const sedM =
  data?.questionnaires?.gpaq?.sedentarite?.minutes_par_jour ??
  data?.questionnaires?.marshall?.sedentarite?.minutes_par_jour ??
  null;

if (sedH !== null) {
let sedText = "";

if ((sedH ?? 0) > 0 && (sedM ?? 0) > 0) {
  sedText = `${sedH} h ${sedM} min / jour`;
} else if ((sedH ?? 0) > 0) {
  sedText = `${sedH} h / jour`;
} else if ((sedM ?? 0) > 0) {
  sedText = `${sedM} min / jour`;
}

output += `\nTemps assis / couché (hors sommeil) : ${sedText}\n`;
}
  output += "\n";
/* =========================
   MOTIVATION
========================= */

output += "Stade motivationnel : ";
output += data.motivation.stade;
output += "\n";

output += "Importance (0–10) : ";
output += data.motivation.importance_eva_0_10;
output += "/10\n";

output += "Confiance (0–10) : ";
output += data.motivation.confiance_eva_0_10;
output += "/10\n";

output += "\n";   // espace avant conclusion
  
/* =========================
   2. QUESTIONNAIRE UTILISÉ
========================= */

output += "2. QUESTIONNAIRE UTILISÉ\n";
output += "------------------------\n";

output += data.meta.questionnaire + "\n\n";

if (data.meta.questionnaire === "Marshall") {

  output += "Détail des réponses :\n";
  output += "Question 1 : " + (data.questionnaires.marshall.q1 || 0) + " points\n";
  output += "Question 2 : " + (data.questionnaires.marshall.q2 || 0) + " points\n";
  output += "Score total : " +
    ((data.questionnaires.marshall.q1 || 0) +
     (data.questionnaires.marshall.q2 || 0)) +
    "\n\n";
}

if (data.meta.questionnaire === "GPAQ") {

  output += "DÉTAIL DES RÉPONSES (GPAQ)\n";
  output += "---------------------------------------------\n";
  output += "Type                | Jours | Durée / jour\n";
  output += "---------------------------------------------\n";

  const g = data.questionnaires.gpaq;

  function formatLine(label, obj) {
    const jours = obj?.jours_par_semaine ?? 0;
    const h = obj?.heures_par_jour ?? 0;
    const m = obj?.minutes_par_jour ?? 0;

    const duree = `${h}h ${m}min`;

    return label.padEnd(20) + " | " +
           String(jours).padEnd(5) + " | " +
           duree + "\n";
  }

  output += formatLine("Travail intense", g?.travail?.intense);
  output += formatLine("Travail modéré", g?.travail?.moderee);
  output += formatLine("Déplacements", g?.deplacements);
  output += formatLine("Loisirs intenses", g?.loisirs?.intense);
  output += formatLine("Loisirs modérés", g?.loisirs?.moderee);
  // Ligne sédentarité (hors sommeil)
  const sedH = g?.sedentarite?.heures_par_jour ?? 0;
  const sedM = g?.sedentarite?.minutes_par_jour ?? 0;

  output += "\n";
  output += "Sédentarité (hors sommeil)\n";
  output += "Temps assis / couché : " + sedH + "h " + sedM + "min / jour\n";
  output += "---------------------------------------------\n\n";
}

output += "Ce document est destiné à être discuté avec votre médecin.";

return output;
}
  
function copyContent() {

  if (!data) {
    alert("Données indisponibles.");
    return;
  }

  const text = buildReadableSummary(data);

   if (!navigator.clipboard || !navigator.clipboard.writeText) {
    alert("La copie automatique n’est pas disponible sur ce navigateur.");
    return;
  }

  navigator.clipboard.writeText(text)
    .catch(() => {
      alert("Copie impossible.");
    });
}

function downloadJSON(){

  const data = sessionStorage.getItem("preconsultation_final");

  if(!data){
    alert("Données indisponibles.");
    return;
  }

  const filename = "auto-evaluation-activite-physique.json";

  // Méthode mobile robuste
  const dataStr = "data:application/json;charset=utf-8," + encodeURIComponent(data);

  const link = document.createElement("a");
  link.setAttribute("href", dataStr);
  link.setAttribute("download", filename);
  link.style.display = "none";

  document.body.appendChild(link);
  link.click();

  setTimeout(function(){
    document.body.removeChild(link);
  }, 100);

}
 // 🔒 Safari macOS : figer le DOM après construction complète

}, 0);
